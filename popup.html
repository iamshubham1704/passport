<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Context Passport</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      font-size: 13px;
    }

    /* ---- SCREENS ---- */
    .screen { display: none; flex-direction: column; }
    .screen.active { display: flex; }

    /* ---- SCREEN 1: SETUP ---- */
    #screen-setup {
      padding: 16px;
      gap: 10px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .logo {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .badge {
      font-size: 10px;
      background: #7c3aed;
      color: #fff;
      padding: 2px 8px;
      border-radius: 999px;
    }

    label {
      font-size: 11px;
      color: #666;
      margin-bottom: 3px;
      display: block;
    }

    input[type="text"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      padding: 8px 10px;
      color: #f0f0f0;
      font-size: 12px;
      outline: none;
      transition: border 0.15s;
    }

    input[type="text"]:focus { border-color: #7c3aed; }
    input[type="text"]::placeholder { color: #444; }
    input[type="password"] { width:100%; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:7px; padding:8px 10px; color:#f0f0f0; font-size:12px; outline:none; }
    input[type="password"]:focus { border-color: #7c3aed; }

    .btn-primary {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      background: #7c3aed;
      color: white;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ---- SCREEN 2: EDIT ---- */
    #screen-edit {
      padding: 0;
    }

    .edit-header {
      padding: 12px 16px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .edit-title { font-size: 13px; font-weight: 600; color: #fff; }

    .btn-back {
      font-size: 11px;
      color: #666;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
    }
    .btn-back:hover { color: #aaa; }

    .edit-body {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 360px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    /* Checklist items */
    .checklist { display: flex; flex-direction: column; gap: 4px; }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #161616;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 6px 8px;
    }

    .check-item input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #7c3aed;
      cursor: pointer;
      flex-shrink: 0;
    }

    .check-item .item-text {
      flex: 1;
      font-size: 11px;
      color: #ccc;
      background: none;
      border: none;
      outline: none;
      padding: 0;
      width: 100%;
    }

    .check-item .item-text::placeholder { color: #444; }

    .check-item .del-btn {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }
    .check-item .del-btn:hover { color: #ef4444; }

    .add-item-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .add-item-input {
      flex: 1;
      background: #111;
      border: 1px dashed #2a2a2a;
      border-radius: 6px;
      padding: 6px 8px;
      color: #888;
      font-size: 11px;
      outline: none;
    }

    .add-item-input:focus { border-color: #7c3aed; color: #ccc; }
    .add-item-input::placeholder { color: #3a3a3a; }

    .add-btn {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      font-size: 16px;
      padding: 3px 10px;
      line-height: 1.4;
    }
    .add-btn:hover { color: #7c3aed; border-color: #7c3aed; }

    /* Decision tags */
    .decision-list { display: flex; flex-direction: column; gap: 4px; }

    .decision-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #161616;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 6px 8px;
    }

    .decision-item .item-text {
      flex: 1;
      font-size: 11px;
      color: #ccc;
      background: none;
      border: none;
      outline: none;
    }

    /* Info row */
    .info-row {
      background: #161616;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 11px;
      color: #666;
      line-height: 1.5;
    }

    .info-row span { color: #999; }

    /* CONTINUE field */
    .continue-box {
      background: #161616;
      border: 1px solid #7c3aed44;
      border-radius: 6px;
      padding: 8px 10px;
    }

    .continue-box textarea {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      color: #ccc;
      font-size: 11px;
      resize: none;
      line-height: 1.5;
      font-family: inherit;
    }

    /* Copy row */
    .copy-section {
      padding: 10px 16px 14px;
      border-top: 1px solid #1e1e1e;
    }

    .copy-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }

    .tools-row {
      display: flex;
      gap: 5px;
    }

    .tool-btn {
      flex: 1;
      padding: 8px 4px;
      border-radius: 6px;
      border: 1px solid #222;
      background: #111;
      color: #777;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.15s;
      text-align: center;
    }

    .tool-btn:hover { border-color: #7c3aed; color: #fff; background: #1a1a1a; }
    .tool-btn.copied { border-color: #22c55e; color: #22c55e; }

    .status {
      font-size: 11px;
      color: #555;
      text-align: center;
      padding: 6px 0 0;
      min-height: 18px;
    }
    .status.success { color: #22c55e; }
    .status.error { color: #ef4444; }

    /* Scrollbar */
    .edit-body::-webkit-scrollbar { width: 3px; }
    .edit-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- SCREEN 1: Setup -->
  <div id="screen-setup" class="screen active">
    <div class="logo-row">
      <span class="logo">Context Passport</span>
      <span class="badge">v6</span>
    </div>

    <div>
      <label>Project name (auto-detect if blank/default)</label>
      <input type="text" id="projectName" placeholder="e.g. My App" value="My Project" />
    </div>

    <div>
      <label>Goal (optional, auto-detected if blank)</label>
      <input type="text" id="goalText" placeholder="e.g. Chrome ext for AI context transfer" />
    </div>

        <button class="btn-primary" id="generateBtn">Generate Passport</button>

    <div class="status" id="setupStatus"></div>
  </div>

  <!-- SCREEN 2: Edit & Copy -->
  <div id="screen-edit" class="screen">

    <div class="edit-header">
      <span class="edit-title">Edit & Copy</span>
      <button class="btn-back" id="backBtn">Back</button>
    </div>

    <div class="edit-body">

      <!-- Info -->
      <div>
        <div class="section-label">Session Info</div>
        <div class="info-row" id="infoRow">...</div>
      </div>

      <!-- DONE checklist -->
      <div>
        <div class="section-label">Done</div>
        <div class="checklist" id="doneList"></div>
        <div class="add-item-row" style="margin-top:5px;">
          <input class="add-item-input" id="doneInput" placeholder="Add done item..." />
          <button class="add-btn" id="doneAddBtn">+</button>
        </div>
      </div>

      <!-- NEXT checklist -->
      <div>
        <div class="section-label">Next</div>
        <div class="checklist" id="nextList"></div>
        <div class="add-item-row" style="margin-top:5px;">
          <input class="add-item-input" id="nextInput" placeholder="Add next item..." />
          <button class="add-btn" id="nextAddBtn">+</button>
        </div>
      </div>

      <!-- DECISIONS -->
      <div>
        <div class="section-label">Decisions</div>
        <div class="decision-list" id="decisionList"></div>
        <div class="add-item-row" style="margin-top:5px;">
          <input class="add-item-input" id="decisionInput" placeholder="Add decision..." />
          <button class="add-btn" id="decisionAddBtn">+</button>
        </div>
      </div>

      <!-- CONTINUE -->
      <div>
        <div class="section-label">Continue from</div>
        <div class="continue-box">
          <textarea id="continueText" rows="2" placeholder="What should AI continue with?"></textarea>
        </div>
      </div>

    </div>

    <!-- Copy buttons -->
    <div class="copy-section">
      <div class="copy-label">Copy for</div>
      <div class="tools-row">
        <button class="tool-btn" data-tool="claude">Claude</button>
        <button class="tool-btn" data-tool="chatgpt">ChatGPT</button>
        <button class="tool-btn" data-tool="cursor">Cursor</button>
        <button class="tool-btn" data-tool="gemini">Gemini</button>
      </div>
      <div class="status" id="editStatus"></div>
    </div>

  </div>

  <script src="compress.js"></script>
  <script src="popup.js"></script>
</body>
</html>
